    <h1 style="font-size:1.125rem;margin-bottom:0.75rem">Chương 4: Chapter 4</h1>
    <p style="white-space:pre-wrap;font-size:0.9rem">Tiêu Bích Vân xưa nay luôn dùng vẻ yếu đuối để thắng nguyên chủ, nàng ta chưa từng thấy một Hoàng hậu ra tay trực tiếp và thô bạo như thế này. “Ngươi… ngươi dám vô lễ!” Nàng ta định đứng dậy định tát ta. Nhưng tay nàng ta vừa nhấc lên, ta đã nhanh hơn. Ta túm lấy tóc nàng ta, kéo mạnh xuống, tát trái tát phải liên tiếp bốn cái đau điếng. Tiếng “chát chát” vang vọng khắp tẩm điện. “Biết phụ thân ta là đại tướng quân, mà ngươi còn dám cướp sâm của ta? Cha ngươi là Thái phó, dạy ngươi lễ nghĩa để đi ăn cướp à?” Tiêu Bích Vân bị đánh tới mức choáng váng, ôm mặt khóc rống lên: “Á… bụng ta… bụng ta đau quá! Ma ma… nàng ta đánh vào bụng lão nô!” Lão ma ma già thấy thế liền kêu gào thảm thiết: “Trời ơi! Động thai khí rồi! Ra máu rồi! Hoàng hậu giết người rồi!” Ta lạnh lùng nhìn màn kịch vụng về đó. Động thai khí? Được, vậy ta giúp ngươi &quot;động&quot; thật sự. Trong sự bàng hoàng của tất cả mọi người, ta nhấc chân, dồn lực vào mũi giày, tung một cú đá sấm sét thẳng vào cái bụng &quot;long thai&quot; của nàng ta. Rắc! Một tiếng động lạ vang lên, không giống tiếng xương gãy, mà giống tiếng tre mây bị ép mạnh. Tiêu Bích Vân không hề chảy máu, cũng không hề ngất xỉu vì đau bụng, mà thay vào đó, cái bụng của nà…</p>
