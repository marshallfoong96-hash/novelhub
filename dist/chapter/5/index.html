    <h1 style="font-size:1.125rem;margin-bottom:0.75rem">Chương 5: Chapter 5</h1>
    <p style="white-space:pre-wrap;font-size:0.9rem">Dù đám ma ma và thái giám cung Nghi Lan liều chết kéo lại, ta vẫn vận lực vào chân, tung một cú đá sấm sét khiến thứ giấu trong bụng Tiêu Bích Vân rơi rụng ra ngoài. Cộp. Một cái rổ mây nhỏ, loại thường dùng để đựng trái cây, lăn lóc trên nền gạch men lạnh lẽo. Cả tẩm điện chết lặng. Không gian im phăng phắc đến mức nghe rõ cả tiếng hít hà kinh hãi. Hồng Thự là người phản ứng nhanh nhất, nàng chỉ tay vào cái rổ, hét lớn: “Trời ơi! Là cái rổ! Quý phi nương nương sinh ra một cái rổ!” Bạch Thự lập tức bồi thêm một đao, giọng vang như khánh đồng: “Quý phi giả mang thai! Nàng ta không có long thai, vậy mà dám cướp nhân sâm nghìn năm của Hoàng hậu. Đây không phải là tranh sủng, đây rõ ràng là muốn hại chết nương nương, mưu hại quốc mẫu!” Ta nhìn hai nha đầu nhà mình, thầm khen ngợi trong lòng. Nói rất tốt! Hãy nói to lên cho cả hoàng cung này nghe thấy! Tiêu Bích Vân nhìn cái rổ nằm trơ trọi, mặt cắt không còn giọt máu. Nhưng bản năng &quot;trà xanh&quot; lâu năm khiến nàng ta vẫn cố giãy giụa: “Các người nói bậy! Là Hoàng hậu... là tỷ tỷ đã dùng yêu thuật hại chết con của ta!” À, muốn đổ vấy sao? Được thôi, nếu đã thích chơi kiểu huyền huyễn, ta sẽ cho ngươi nếm mùi &quot;pháp sư&quot; thực thụ. Ta lập tứ…</p>
