    <h1 style="font-size:1.125rem;margin-bottom:0.75rem">Chương 3: Chapter 3</h1>
    <p style="white-space:pre-wrap;font-size:0.9rem">“Hoàng hậu nương nương! Người không thể vào! Quý phi đang nghỉ ngơi!” Lũ thái giám và cung nữ của Nghi Lan Các hoảng hốt lao ra cản đường. Ta không nói nửa lời, chân đá bay tên thái giám dẫn đầu, đoản kiếm trong bao vung ra ngang cổ gã thủ vệ. Đến trước đại điện, lão thái giám tổng quản của Quý phi run cầm cập chặn cửa: “Nương nương… Quý phi đang mang long thai, vạn nhất có chuyện gì…” Xoẹt! Lưỡi kiếm lướt qua, chém bay cái mũ quan trên đầu lão. Ta gằn giọng: “Ngươi biết ta là Hoàng hậu, vậy có biết ta cũng là nữ nhi nhà tướng? Hậu cung này, chỗ nào ta muốn vào mà phải xin phép hạng nô tài như ngươi? Giao nhân sâm ra, ngay lập tức!” Sát khí của một vị tướng môn khiến lũ nô tài tiểu ra quần, không ai dám bước lên thêm bước nào. Ta đạp cửa xông vào. Bên trong, Tiêu Bích Vân đang nằm thư thái trên ghế quý phi, cung nữ xung quanh đang quạt mát và dâng trái cây tươi. Thấy ta xông vào với kiếm trên tay, nàng ta giật mình đánh rơi chén trà sứ thanh hoa. “Diệp Lương Trừng! Ngươi điên rồi sao? Ngươi muốn mưu hại long thai?” Lão ma ma thân tín của nàng ta lập tức chắn phía trước, la hét: “Người đâu! Mau bảo vệ Quý phi! Hoàng hậu điên rồi!” Ta nhìn cái bụng hơi nhô lên của nàng ta, cười khẩy…</p>
