    <p style="white-space:pre-wrap;font-size:0.9rem">Ta tên là Diệp Lương Trừng. Một ngày nọ, khi vừa nhắm mắt sau một ca trực cấp cứu kéo dài 48 tiếng ở thế giới hiện đại, ta tỉnh dậy trong một không gian nồng nặc mùi trầm hương và thuốc sắc đắng nghét. Ta xuyên không rồi. Đen đủi thay, ta xuyên vào một cuốn tiểu thuyết cung đấu quyền mưu mà ta vừa đọc lướt qua đoạn kết đêm qua. Nguyên chủ cùng tên với ta, xuất thân từ phủ Trấn Bắc Hầu danh giá. Phụ thân nàng là đại tướng quân Diệp Thiết, người nắm giữ mười vạn tinh binh trấn giữ biên thùy. Hoàng đế Đoan Mộc Hằng là một kẻ âm hiểm, đa mưu túc trí. Hắn cưới nguyên chủ làm Hoàng hậu không phải vì yêu, mà vì muốn biến nàng thành con con tin để khống chế vạn quân nhà họ Diệp. Nhưng trong bóng tối của tử cấm thành, hắn nạp con gái của ân sư mình — Tiêu Bích Vân, phong làm Quý phi, sủng ái vô biên để đối trọng với quyền lực của ta. Hậu cung của hắn là một bàn cờ: cháu gái Thái hậu để lấy lòng tông thất, thiên kim Thượng thư để bình ổn triều đình, công chúa ngoại bang để đổi lấy hòa bình... Tất cả nữ nhân ấy đều điên cuồng tranh đấu, kẻ dệt gấm thêu hoa, người hạ độc thủ, ai cũng tưởng mình là người duy nhất chiếm được trái tim Thiên tử. Nhưng thực ra, trái tim Đoan Mộc Hằng sớm đã trao c…</p>
