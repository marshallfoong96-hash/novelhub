    <h1 style="font-size:1.125rem;margin-bottom:0.75rem">Chương 2: Chapter 2</h1>
    <p style="white-space:pre-wrap;font-size:0.9rem">“Hoàng hậu nương nương… người phải gắng gượng lên.” Tiếng khóc thút thít cắt ngang dòng suy nghĩ của ta. Hồng Thự, tỳ nữ thân cận, vừa lau nước mắt vừa run rẩy bưng bát thuốc đen đặc: “Quý phi Tiêu Bích Vân ngày càng kiêu ngạo. Hôm qua nô tỳ đến Ngự Dược Phòng lấy nhân sâm nghìn năm để người dẫn thuốc, nhưng bọn thái giám ở đó nói… toàn bộ sâm quý đã bị Quý phi lấy hết để an thai.” Bạch Thự đứng bên cạnh, nắm chặt tay, tức giận đến đỏ cả mặt: “Họ còn nói nương nương là cành khô lá héo, dùng sâm quý chỉ phí của trời, để dành cho long thai của Quý phi mới là đại sự. Rõ ràng Quý phi biết người đang trong cơn nguy kịch mới cố ý cướp đoạt!” Trong ký ức của nguyên chủ, nàng vì uất ức mà bệnh càng nặng, cuối cùng buông tay nhân gian trong cô độc. Nhưng ta thì khác. Ta là Diệp Lương Trừng của thế kỷ 21, người từng cầm dao mổ giành giật sự sống với tử thần. Ta đột nhiên bật dậy, động tác dứt khoát như cá chép hóa rồng, khiến bát thuốc trên tay Hồng Thự suýt đổ nhào. “Nhân sâm nghìn năm của ta mà nàng ta cũng dám động vào?” Ta bẻ khớp tay nghe răng rắc, tinh thần phấn chấn đến lạ thường. “Đã muốn giành đồ của Diệp Lương Trừng này, thì chuẩn bị mất mạng đi.” Hai cung nữ ngơ ngác nhìn chủ tử…</p>
